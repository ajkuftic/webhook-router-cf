name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deployment
  cancel-in-progress: false

env:
  NODE_VERSION: '18'
  WORKING_DIRECTORY: './webhook-router-cf'

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIRECTORY }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Type check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run type-check

      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.WORKING_DIRECTORY }}/dist
          retention-days: 1

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: 'https://webhook-router.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIRECTORY }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: Deploy to Cloudflare
        id: deploy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 Deploying webhook router..."
          npx wrangler deploy
          WORKER_URL="https://webhook-router.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployment complete: $WORKER_URL"

      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: '${{ github.event.inputs.environment || 'production' }}',
              description: 'Cloudflare Worker deployment',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.worker_url }}',
              description: 'Successfully deployed to Cloudflare Workers'
            });

      - name: Post deployment summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployStatus = '${{ job.status }}';
            const workerUrl = '${{ steps.deploy.outputs.worker_url }}';
            const environment = '${{ github.event.inputs.environment || 'production' }}';

            let summary = '## 🚀 Deployment Report\n\n';
            summary += `**Status:** ${deployStatus === 'success' ? '✅ Success' : '❌ Failed'}\n`;
            summary += `**Environment:** ${environment}\n`;
            summary += `**Commit:** ${context.sha.substring(0, 7)}\n`;
            summary += `**Branch:** ${context.ref.split('/').pop()}\n`;

            if (workerUrl) {
              summary += `**Worker URL:** [${workerUrl}](${workerUrl})\n`;
              summary += '\n### Test the webhook:\n';
              summary += '```bash\n';
              summary += `curl -X POST ${workerUrl}/webhook/<secret> \\\n`;
              summary += '  -H "Content-Type: application/json" \\\n';
              summary += '  -d \'{"alert_type":"test","message":"Deployment successful"}\'\n';
              summary += '```\n';
            }

            core.notice(summary);
            console.log(summary);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issue = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr ? pr.number : null
            };

            if (issue.issue_number) {
              await github.rest.issues.createComment({
                ...issue,
                body: `❌ **Deployment failed** for commit ${context.sha.substring(0, 7)}\n\nCheck the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
              });
            }

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Wait for deployment
        run: sleep 5

      - name: Health check
        id: health
        run: |
          WORKER_URL="https://webhook-router.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          echo "Checking health of: $WORKER_URL"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/api/health")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS"
            echo "status=degraded" >> $GITHUB_OUTPUT
          fi

      - name: Post health status
        if: always()
        run: |
          echo "Worker health status: ${{ steps.health.outputs.status }}"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "### Deployment Summary"
          echo "- Deploy status: ${{ needs.deploy.result }}"
          echo "- Health check: ${{ needs.health-check.result }}"
          echo "- Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify Slack (optional)
        if: failure() && secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Webhook Router deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Webhook Router Deployment Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
