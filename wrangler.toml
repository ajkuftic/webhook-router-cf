name = "webhook-router"
type = "service"
account_id = ""  # Set via wrangler login
workers_dev = true

main = "src/index.ts"
compatibility_date = "2024-12-10"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { ENVIRONMENT = "production" }

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "webhook-router"
database_id = ""  # Generated after: wrangler d1 create webhook-router
migrations_dir = "migrations"

# KV Namespace (optional, for future use)
# [[kv_namespaces]]
# binding = "CACHE"
# id = ""

# Environment Variables
[env.development]
vars = { ENVIRONMENT = "development" }

# Build Configuration
[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "service-worker"

# Observability
[observability]
enabled = true

# Triggers (optional - for scheduled jobs like session cleanup)
# [[triggers.crons]]
# crons = ["0 3 * * *"]  # Daily cleanup at 3 AM
